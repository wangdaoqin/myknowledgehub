<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 | 知海导航</title>
  <style>
    :root {
      --background: #070b12;
      --foreground: #f4f7fb;
      --sidebar-bg: rgba(16, 37, 61, 0.8);
      --card-bg: rgba(255, 255, 255, 0.05);
      --border-color: rgba(255, 255, 255, 0.1);
      --primary-color: #81cfe0;
      --success-color: #6ee7b7;
      --warning-color: #fcd34d;
      --danger-color: #f87171;
    }
    
    * {
      box-sizing: border-box;
    }
    
    body {
      background: var(--background);
      color: var(--foreground);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 0;
    }
    
    .container {
      display: flex;
      min-height: 100vh;
    }
    
    .sidebar {
      width: 250px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      padding: 24px;
    }
    
    .logo {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--primary-color);
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .nav-menu {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .nav-item {
      margin-bottom: 8px;
    }
    
    .nav-link {
      display: block;
      padding: 12px 16px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--foreground);
      transition: all 0.2s ease;
    }
    
    .nav-link:hover {
      background: rgba(129, 207, 224, 0.1);
      color: var(--primary-color);
    }
    
    .nav-link.active {
      background: rgba(129, 207, 224, 0.2);
      color: var(--primary-color);
      border-left: 3px solid var(--primary-color);
    }
    
    .main-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: bold;
      margin: 0;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: var(--primary-color);
      margin-bottom: 8px;
    }
    
    .stat-label {
      font-size: 14px;
      color: #a1a1aa;
    }
    
    .button {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
    }
    
    .button-primary {
      background: var(--primary-color);
      color: var(--background);
    }
    
    .button-primary:hover {
      background: #4ecdc4;
    }
    
    .button-success {
      background: var(--success-color);
      color: var(--background);
    }
    
    .button-success:hover {
      background: #34d399;
    }
    
    .button-warning {
      background: var(--warning-color);
      color: var(--background);
    }
    
    .button-warning:hover {
      background: #fbbf24;
    }
    
    .button-danger {
      background: var(--danger-color);
      color: var(--foreground);
    }
    
    .button-danger:hover {
      background: #ef4444;
    }
    
    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    
    .table th,
    .table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    
    .table th {
      background: rgba(255, 255, 255, 0.05);
      font-weight: 600;
    }
    
    .table tr:hover {
      background: rgba(129, 207, 224, 0.05);
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--foreground);
      font-size: 14px;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    
    .form-select {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--foreground);
      font-size: 14px;
    }
    
    .form-textarea {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--foreground);
      font-size: 14px;
      resize: vertical;
      min-height: 100px;
    }
    
    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal-content {
      background: var(--background);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 600px;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .modal-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }
    
    .modal-close {
      background: none;
      border: none;
      color: var(--foreground);
      font-size: 24px;
      cursor: pointer;
    }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
      
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }
      
      .nav-menu {
        display: flex;
        overflow-x: auto;
        gap: 8px;
      }
      
      .nav-item {
        white-space: nowrap;
        margin-bottom: 0;
      }
      
      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="logo">Admin Panel</div>
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="#" class="nav-link active">仪表盘</a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link">资源管理</a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link">用户管理</a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link">分类管理</a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link">标签管理</a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link">系统设置</a>
        </li>
        <li class="nav-item">
          <a href="#" class="nav-link">日志管理</a>
        </li>
        <li class="nav-item">
          <a href="index.html" class="nav-link">返回前台</a>
        </li>
      </ul>
    </div>
    
    <div class="main-content">
      <div class="header">
        <h1>管理仪表盘</h1>
        <div class="user-info">
          <span>管理员</span>
          <div class="user-avatar">A</div>
        </div>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">128</div>
          <div class="stat-label">总资源数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">4</div>
          <div class="stat-label">分类数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">64</div>
          <div class="stat-label">标签数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">12</div>
          <div class="stat-label">用户数</div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-title">最近更新的资源</div>
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>标题</th>
              <th>分类</th>
              <th>更新时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>Python 数据分析入门教程</td>
              <td>编程语言</td>
              <td>2026-03-24</td>
              <td>
                <a href="#" class="button button-primary">编辑</a>
                <a href="#" class="button button-danger">删除</a>
              </td>
            </tr>
            <tr>
              <td>2</td>
              <td>JavaScript ES2026 新特性</td>
              <td>编程语言</td>
              <td>2026-03-23</td>
              <td>
                <a href="#" class="button button-primary">编辑</a>
                <a href="#" class="button button-danger">删除</a>
              </td>
            </tr>
            <tr>
              <td>3</td>
              <td>AI 大模型应用开发指南</td>
              <td>AI 工具教程</td>
              <td>2026-03-22</td>
              <td>
                <a href="#" class="button button-primary">编辑</a>
                <a href="#" class="button button-danger">删除</a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      
      <div class="card">
        <div class="card-title">添加新资源</div>
        <form>
          <div class="form-group">
            <label class="form-label">标题</label>
            <input type="text" class="form-input" placeholder="输入资源标题">
          </div>
          <div class="form-group">
            <label class="form-label">URL</label>
            <input type="url" class="form-input" placeholder="输入资源链接">
          </div>
          <div class="form-group">
            <label class="form-label">分类</label>
            <select class="form-select">
              <option value="programming">编程语言</option>
              <option value="statistics">统计分析</option>
              <option value="ai">AI 工具教程</option>
              <option value="accounting">会计知识教程</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">描述</label>
            <textarea class="form-textarea" placeholder="输入资源描述"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">标签</label>
            <input type="text" class="form-input" placeholder="输入标签，用逗号分隔">
          </div>
          <div class="form-actions">
            <button type="submit" class="button button-success">保存</button>
            <button type="button" class="button button-warning">取消</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
